<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <!-- Скрипты только свои, видео только с диска — ничего внешнего -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self'; style-src 'self'; media-src file:"
  />
  <title>Wallpaper</title>
  <link rel="stylesheet" href="wallpaper.css" />
</head>
<body>
  <!-- Два видео-слоя для плавного кроссфейда между клипами -->
  <video id="video-a" autoplay playsinline></video>
  <video id="video-b" autoplay playsinline></video>
  <script src="wallpaper.js"></script>
</body>
</html>
